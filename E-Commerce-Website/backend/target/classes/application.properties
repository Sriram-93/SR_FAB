# Server Configuration
server.port=${PORT:8080}
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=20MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/srfab}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.admin.email=${ADMIN_EMAIL}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Stock Alert Threshold
app.stock.alert-threshold=5

# AI 3D Model Generation (Open-source via Hugging Face)
ai.3d.provider=${AI_3D_PROVIDER:hf}
ai.hf.api-token=${HF_API_TOKEN:}
ai.hf.model-id=${HF_3D_MODEL_ID:}
ai.hf.inference-base-url=${HF_INFERENCE_BASE_URL:https://router.huggingface.co/hf-inference/models}
ai.hf.request-timeout-ms=${HF_REQUEST_TIMEOUT_MS:180000}
ai.hf.max-retries=${HF_MAX_RETRIES:2}
ai.model.output-format=${MODEL_OUTPUT_FORMAT:glb}
ai.model.cloudinary-folder=${MODEL_CLOUDINARY_FOLDER:products/3d-models}
ai.model.poll-interval-ms=${MODEL_POLL_INTERVAL_MS:4500}
ai.model.max-poll-attempts=${MODEL_MAX_POLL_ATTEMPTS:30}
ai.tripo.api-key=${TRIPO_API_KEY:}


