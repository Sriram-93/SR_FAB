# Render Blueprint Specification for SR FAB
# Use this in Render by selecting "Blueprint" and connecting your repository.
# Blueprint Path: E-Commerce-Website/render.yaml

envVarGroups:
  - name: sr-fab-secrets
    envVars:
      - key: DB_URL
        sync: false # User will provide in Render UI
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true # Render can generate a secure one if not provided
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: TRIPO_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false

services:
  # SR FAB Backend (Spring Boot Docker)
  - type: web
    name: sr-fab-backend
    runtime: docker
    rootDir: E-Commerce-Website/backend
    dockerfilePath: E-Commerce-Website/backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - fromGroup: sr-fab-secrets
    healthCheckPath: /api/health

  # SR FAB Frontend (Vite Static Site)
  - type: web
    name: sr-fab-frontend
    runtime: static
    rootDir: E-Commerce-Website/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Proxy API requests to backend
      - type: rewrite
        source: /api/*
        destination: https://sr-fab-backend.onrender.com/api/*
      # Single Page Application routing
      - type: rewrite
        source: /*
        destination: /index.html
